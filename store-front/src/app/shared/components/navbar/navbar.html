<mat-toolbar color="primary" class="topbar" role="navigation" aria-label="Main navigation">
  <div class="brand" routerLink="/" aria-label="StoreAPI home">
    <span class="brand-text">StoreAPI</span>
  </div>

  <div class="spacer"></div>

  <div class="nav-links">
    <button
      mat-button
      class="nav-btn"
      routerLink="/"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Products
    </button>
  </div>

  <div class="auth-area">
    @if (isAuthenticated()) {
      @if (currentUser()?.role === 'ADMIN') {
        <button
          mat-icon-button
          class="settings-btn"
          routerLink="/admin"
          routerLinkActive="is-active"
          aria-label="Settings"
          title="Settings"
        >
          <mat-icon>settings</mat-icon>
        </button>
      }
      <span class="user-chip" title="Signed in user">
        <button
          class="user-chip-btn"
          routerLink="/profile"
          routerLinkActive="is-active"
          aria-label="Open profile"
        >
          <span class="user-chip-avatar-wrap" aria-hidden="true">
            <span class="user-chip-avatar">{{ (currentUser()?.name || 'U').charAt(0).toUpperCase() }}</span>
            <span class="user-chip-status"></span>
          </span>
          <span class="user-chip-text">{{currentUser()?.name}}</span>
          <mat-icon class="user-chip-chevron" aria-hidden="true">expand_more</mat-icon>
        </button>
      </span>
      <button mat-flat-button class="logout-btn" (click)="onLogout()">Logout</button>
    } @else {
      <button mat-button class="ghost-btn" routerLink="/login" routerLinkActive="is-active">
        Login
      </button>
      <button mat-flat-button class="cta-btn" routerLink="/register" routerLinkActive="is-active">
        Register
      </button>
    }
  </div>
</mat-toolbar>
